    Academic Projects:
      - name: Parallelization and Optimization of a Heat Equation Solver
        summary: Attempted as part of Programming for Supercomputers course (Summer 2025) at FAU, with Salman Salim
        highlights:
          - Parallelized a finite-difference heat equation solver using OpenMP, achieving significant speedup on multicore
            CPU architectures.
          - Optimized memory access patterns and applied compiler flags with SIMD (AVX) vectorization to maximize cache
            efficiency and throughput.

      - name: CPU & GPU benchmarking of a Molecular Dynamics Solver
        summary: Attempted as part of the Multicore Simulations seminar (Summer 2026) at FAU
        highlights:
          - Conducted a comparative performance study of an MD solver across CPU (AMD EPYC) and GPU (NVIDIA A10/A100/H100)
            environments, profiling compute vs. memory-bound bottlenecks.
          - Used LIKWID, NVIDIA Nsight, and Nsight Compute to analyze communication overhead, cache utilization, and
            kernel efficiency.
          - Evaluated energy efficiency and throughput metrics to recommend optimal hardware configurations for
            large-scale physical simulations.

